<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel | Technite</title>
  <meta name="description" content="Technite admin panel for jobs and applications.">
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='32' height='32' fill='%23125966'/%3E%3Crect x='32' width='32' height='32' fill='%23c6562f'/%3E%3Crect y='32' width='32' height='32' fill='%23eabd48'/%3E%3Crect x='32' y='32' width='32' height='32' fill='%23788290'/%3E%3C/svg%3E">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Chakra+Petch:wght@500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="backdrop" aria-hidden="true"></div>
  <header class="site-header">
    <div class="shell topbar">
      <a class="brand" href="index.html" aria-label="Technite Home">
        <span class="brand-mark" aria-hidden="true">
          <span class="tile tile-a"></span>
          <span class="tile tile-b"></span>
          <span class="tile tile-c"></span>
          <span class="tile tile-d"></span>
        </span>
        <span class="brand-text">
          <strong>TECHNITE ADMIN</strong>
          <small>Jobs and Applications</small>
        </span>
      </a>
      <button id="admin-logout" class="btn btn-ghost" type="button">Logout</button>
    </div>
  </header>

  <main class="shell page-main">
    <section class="panel reveal" id="admin-login-panel">
      <h2>Admin Login</h2>
      <p class="muted">Default primary admin: Loai.metwalli@technite.net</p>
      <form id="admin-login-form" class="contact-form">
        <label>
          Admin Email
          <input type="email" name="email" value="Loai.metwalli@technite.net" required>
        </label>
        <label>
          Password
          <input type="password" name="password" required>
        </label>
        <button class="btn btn-primary" type="submit">Sign In</button>
        <p id="admin-login-result" class="muted"></p>
      </form>
    </section>

    <section class="panel reveal" id="admin-dashboard" hidden>
      <h2>Jobs Management</h2>
      <form id="admin-job-form" class="contact-form">
        <input type="hidden" id="admin-job-id" value="">
        <label>
          Job Title
          <input id="admin-job-title" type="text" required>
        </label>
        <label>
          Type
          <input id="admin-job-type" type="text" placeholder="Full-time / Contract / Permanent" required>
        </label>
        <label>
          Description
          <textarea id="admin-job-description" rows="4" required></textarea>
        </label>
        <label class="checkbox-row">
          <input id="admin-job-active" type="checkbox" checked>
          Active role
        </label>
        <div class="inline-actions">
          <button class="btn btn-primary" type="submit">Save Job</button>
          <button id="admin-job-cancel" class="btn btn-ghost" type="button">Cancel Edit</button>
        </div>
      </form>
      <div id="admin-jobs-list" class="job-list"></div>
    </section>

    <section class="panel reveal" id="admin-applications-panel" hidden>
      <h2>Applications Review</h2>
      <div id="admin-applications-list" class="admin-app-list"></div>
    </section>
  </main>

  <footer class="site-footer reveal">
    <div class="shell footer-copy">(c) <span class="copyright-year"></span> Technite. All rights reserved.</div>
  </footer>

  <script src="script.js"></script>
</body>
</html>
